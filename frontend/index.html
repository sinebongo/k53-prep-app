<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Godu Godu Driving School</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com/3.4.1?plugins=forms"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: { primary: '#c1272d' }, fontFamily: { sans: ['Lexend','sans-serif'] }, borderRadius: { custom: '8px' } } }
  }
</script>
<style>
  body { 
    background: #fdfdfd; 
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }
  
  /* Animated Background Elements */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
  }
  
  .floating-sign {
    position: absolute;
    opacity: 0.35;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
    animation: float 15s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-40px) rotate(10deg); }
  }

  .glass-effect {
    background: rgba(255, 255, 255, 0.55);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
  }
  .action-card { 
    transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow .3s; 
    background: rgba(255, 255, 255, 0.65); 
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.4);
  }
  .action-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02); }
  #error-msg { display:none; }
  section.ident-box { 
    background: rgba(255, 255, 255, 0.7) !important; 
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.5);
  }

  @media (max-width: 640px) {
    .floating-sign {
      opacity: 0.2;
      animation-duration: 20s !important;
    }

    .action-card {
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }
  }
</style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

<!-- Animated Background Layer -->
<div class="bg-layer" id="bg-layer">
</div>

<script>
  // Generate random floating signs
  const signs = [
    'assets/img/speed_limit_80.png',
    'assets/img/no_overtaking.png',
    'assets/img/no_u_turn.png',
    'assets/img/pdf_img_p1_1.png',
    'assets/img/pdf_img_p1_2.png',
    'assets/img/pdf_img_p2_1.png',
    'assets/img/pdf_img_p2_2.png',
    'assets/img/pdf_img_p2_5.png',
    'assets/img/pdf_img_p2_6.png',
    'assets/img/pdf_img_p3_1.png',
    'assets/img/pdf_img_p3_3.png',
    'assets/img/pdf_img_p3_4.png',
    'assets/img/pdf_img_p3_5.png',
    'assets/img/pdf_img_p3_6.png',
    'assets/img/pdf_img_p4_2.png',
    'assets/img/pdf_img_p6_1.png'
  ];
  const layer = document.getElementById('bg-layer');
  const signCount = window.innerWidth < 640 ? 10 : 24;
  for (let i = 0; i < signCount; i++) {
    const img = document.createElement('img');
    img.src = signs[Math.floor(Math.random() * signs.length)];
    img.className = 'floating-sign';
    img.style.top = Math.random() * 100 + '%';
    img.style.left = Math.random() * 100 + '%';
    img.style.width = (Math.random() * 60 + 30) + 'px';
    img.style.animationDelay = (Math.random() * -30) + 's';
    img.style.animationDuration = (Math.random() * 15 + 10) + 's';
    layer.appendChild(img);
  }
</script>

<main class="flex-grow flex items-center justify-center px-4 py-6 sm:p-6 sm:-mt-6">
  <div class="w-full max-w-md space-y-8">

    <!-- Header -->
    <header class="text-center space-y-6">
      <div class="space-y-4">
        <img src="assets/img/logo.png" alt="Godu Godu Logo" class="w-36 h-36 sm:w-48 sm:h-48 mx-auto drop-shadow-2xl hover:scale-105 transition-transform duration-300">
        <p class="text-slate-900 font-bold drop-shadow-sm text-lg sm:text-xl">Your journey to the road starts here</p>
      </div>
    </header>

    <!-- Student Identification -->
    <section class="ident-box p-5 sm:p-6 rounded-2xl shadow-sm space-y-4">
      <div class="flex items-center gap-3 mb-2">
        <div class="bg-primary/10 p-2 rounded-lg">
          <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wide">Student Profile</h2>
      </div>
      
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1" for="student-name">Full Name</label>
          <input id="student-name" type="text" placeholder="e.g. John Doe"
            class="block w-full px-4 py-3 rounded-xl border border-gray-200 shadow-sm text-sm focus:ring-primary focus:border-primary transition-all"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1" for="student-phone">Phone Number</label>
          <input id="student-phone" type="tel" placeholder="e.g. 082 123 4567"
            class="block w-full px-4 py-3 rounded-xl border border-gray-200 shadow-sm text-sm focus:ring-primary focus:border-primary transition-all"/>
        </div>
      </div>
      
      <p id="error-msg" class="text-red-500 text-xs font-medium">Please enter both your name and phone number to continue.</p>
    </section>

    <!-- Action cards -->
    <section class="grid grid-cols-1 gap-4">
      <button onclick="go('study')"
        class="action-card flex flex-col sm:flex-row sm:items-center p-5 sm:p-6 bg-white border border-gray-100 rounded-custom shadow-sm hover:border-primary group text-left w-full">
        <div class="flex-shrink-0 p-3 bg-blue-50 text-primary rounded-custom group-hover:bg-primary group-hover:text-white transition-colors">
          <svg class="h-7 w-7 sm:h-8 sm:w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <div class="mt-3 sm:mt-0 sm:ml-5">
          <h2 class="text-lg sm:text-xl font-bold text-gray-900">Study Mode</h2>
          <p class="text-gray-500 text-sm">Review rules and signs at your own pace.</p>
        </div>
      </button>

      <button onclick="go('test')"
        class="action-card flex flex-col sm:flex-row sm:items-center p-5 sm:p-6 bg-white border border-gray-100 rounded-custom shadow-sm hover:border-primary group text-left w-full">
        <div class="flex-shrink-0 p-3 bg-blue-50 text-primary rounded-custom group-hover:bg-primary group-hover:text-white transition-colors">
          <svg class="h-7 w-7 sm:h-8 sm:w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="mt-3 sm:mt-0 sm:ml-5">
          <h2 class="text-lg sm:text-xl font-bold text-gray-900">Take Practice Test</h2>
          <p class="text-gray-500 text-sm">Challenge yourself with a timed 64-question mock exam.</p>
        </div>
      </button>
    </section>

  </div>
</main>

<footer class="py-6 text-center text-slate-900 font-semibold drop-shadow-sm space-y-2">
  <p>© <span id="year"></span> Godu Godu Driving School. All rights reserved.</p>
  <p>
    <a href="admin-login.html" class="text-xs font-medium text-gray-500 hover:text-primary transition-colors">Admin Login</a>
  </p>
</footer>

<script src="assets/js/api.js"></script>
<script>
async function go(destination) {
  const name = document.getElementById('student-name').value.trim();
  const phone = document.getElementById('student-phone').value.trim();
  const errMsg = document.getElementById('error-msg');

  if (!name || !phone) {
    errMsg.style.display = 'block';
    return;
  }
  errMsg.style.display = 'none';

  try {
    const student = await apiFetch('/students/identify', {
      method: 'POST',
      body: JSON.stringify({ name, phone })
    });
    sessionStorage.setItem('student', JSON.stringify(student));
    window.location.href = destination === 'study' ? 'study.html' : 'test.html';
  } catch (e) {
    alert('Could not connect to the server. Make sure the backend is running.\n\n' + e.message);
  }
}

// If already identified, prefill
const existing = getStudent();
if (existing) {
  document.getElementById('student-name').value = existing.name || '';
  document.getElementById('student-phone').value = existing.phone || '';
}
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
