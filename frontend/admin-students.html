<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>K53 Admin – Student Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com/3.4.1?plugins=forms"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors:{ primary:'#c1272d' }, fontFamily:{ sans:['Lexend','sans-serif'] }, borderRadius:{ custom:'8px' } } }
  }
</script>
<style>
  body { background:#f9fafb; font-family:'Lexend',sans-serif; }
  .nav-link { transition:background .15s,color .15s; }
  .nav-link:hover { background:#f1f5ff; }
  .nav-link.active { background:#eff4ff; color:#c1272d; font-weight:600; }
  .drawer { display:none; }
  .drawer.open { display:block; }

  @media (max-width: 1024px) {
    body {
      display: block;
    }

    aside {
      position: static !important;
      width: 100% !important;
      height: auto !important;
      border-right: none !important;
      border-bottom: 1px solid #e5e7eb;
    }

    aside nav {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 1rem;
    }

    aside nav a {
      white-space: nowrap;
      flex: 0 0 auto;
    }

    main {
      margin-left: 0 !important;
    }

    #history-drawer {
      width: 100% !important;
      max-width: 100%;
    }
  }
</style>
</head>
<body class="flex min-h-screen">

<!-- Sidebar -->
<aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full z-10">
  <div class="p-6 border-b border-gray-100 flex items-center gap-3">
    <div class="w-10 h-10 bg-primary flex items-center justify-center rounded-custom text-white">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
    </div>
    <h1 class="font-bold text-xl tracking-tight">K53 Admin</h1>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a href="admin-dashboard.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-custom text-sm text-gray-600">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
      Overview
    </a>
    <a href="admin-questions.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-custom text-sm text-gray-600">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
      Manage Questions
    </a>
    <a href="admin-students.html" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-custom text-sm">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      Student Activity
    </a>
  </nav>
  <div class="p-4 border-t border-gray-100">
    <button onclick="logout()" class="w-full text-xs text-gray-400 hover:text-red-500 transition-colors py-1">Sign out</button>
  </div>
</aside>

<!-- Main -->
<main class="flex-1 ml-64">

  <!-- Top bar -->
  <header class="h-16 border-b border-gray-200 bg-white flex items-center justify-between px-4 sm:px-8 sticky top-0 z-10">
    <div class="flex items-center gap-4 flex-1">
      <div class="max-w-md w-full relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search students by name or phone..."
          class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-primary focus:bg-white transition-colors"
          oninput="filterStudents()"/>
      </div>
    </div>
    <div class="text-sm text-gray-500" id="student-count"></div>
  </header>

  <div class="p-4 sm:p-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold tracking-tight">Student Activity</h2>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-8">
      <div class="bg-white p-5 rounded-custom border border-gray-200 shadow-sm">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Total Students</p>
        <p id="stat-total" class="text-3xl font-bold text-primary mt-1">—</p>
      </div>
      <div class="bg-white p-5 rounded-custom border border-gray-200 shadow-sm">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Active This Week</p>
        <p id="stat-active" class="text-3xl font-bold text-primary mt-1">—</p>
      </div>
      <div class="bg-white p-5 rounded-custom border border-gray-200 shadow-sm">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Tests with Passes</p>
        <p id="stat-passes" class="text-3xl font-bold text-green-600 mt-1">—</p>
      </div>
      <div class="bg-white p-5 rounded-custom border border-gray-200 shadow-sm">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Total Cards Flipped</p>
        <p id="stat-flipped" class="text-3xl font-bold text-blue-600 mt-1">—</p>
      </div>
    </div>

    <!-- Student table -->
    <div class="bg-white rounded-custom border border-gray-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr class="text-left text-xs uppercase tracking-wider text-gray-500">
            <th class="px-6 py-3">Student</th>
            <th class="px-6 py-3">Phone</th>
            <th class="px-6 py-3">Flipped</th>
            <th class="px-6 py-3">Study Time</th>
            <th class="px-6 py-3">Tests</th>
            <th class="px-6 py-3">Last Score</th>
            <th class="px-6 py-3">Status</th>
            <th class="px-6 py-3"></th>
          </tr>
        </thead>
        <tbody id="student-table" class="divide-y divide-gray-50"></tbody>
      </table>
      </div>
      <p id="empty-msg" class="hidden text-center text-gray-400 py-10">No students found.</p>
    </div>
  </div>
</main>

<!-- History drawer -->
<div id="drawer-overlay" class="hidden fixed inset-0 bg-black/30 z-40" onclick="closeDrawer()"></div>
<div id="history-drawer" class="hidden fixed right-0 top-0 h-full w-96 bg-white shadow-2xl z-50 overflow-y-auto">
  <div class="flex items-center justify-between p-6 border-b border-gray-100">
    <h3 id="drawer-name" class="text-lg font-bold">Student History</h3>
    <button onclick="closeDrawer()" class="text-gray-400 hover:text-gray-700 text-2xl">&times;</button>
  </div>
  <div id="drawer-content" class="p-6 space-y-4"></div>
</div>

<script src="assets/js/api.js"></script>
<script>
requireAdmin();

let allStudents = [];

async function init() {
  try {
    allStudents = await apiFetch('/students');
    renderStats();
    renderTable(allStudents);
  } catch(e) {
    alert('Failed to load students: ' + e.message);
  }
}

function renderStats() {
  document.getElementById('stat-total').textContent = allStudents.length;

  const oneWeekAgo = new Date(Date.now() - 7*24*60*60*1000);
  const active = allStudents.filter(s => new Date(s.lastSeen) > oneWeekAgo).length;
  document.getElementById('stat-active').textContent = active;

  const withPass = allStudents.filter(s => s.lastPass === true).length;
  document.getElementById('stat-passes').textContent = withPass;

  const totalFlipped = allStudents.reduce((acc, s) => acc + (s.flippedCardsCount || 0), 0);
  document.getElementById('stat-flipped').textContent = totalFlipped;
}

function renderTable(students) {
  document.getElementById('student-count').textContent = `${students.length} students`;
  const tbody = document.getElementById('student-table');
  if (students.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-msg').classList.remove('hidden');
    return;
  }
  document.getElementById('empty-msg').classList.add('hidden');

    tbody.innerHTML = students.map(s => {
    const initials = s.name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    const lastSeen = new Date(s.lastSeen).toLocaleDateString('en-ZA');
    
    // Format study time
    const s_total = s.totalStudySeconds || 0;
    const h = Math.floor(s_total / 3600);
    const m = Math.floor((s_total % 3600) / 60);
    const studyTimeStr = h > 0 ? `${h}h ${m}m` : `${m}m`;

    const passLabel = s.lastPass === true
      ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">PASS</span>'
      : s.lastPass === false
      ? '<span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">FAIL</span>'
      : '<span class="px-2 py-1 bg-gray-100 text-gray-500 rounded-full text-xs">No tests</span>';

    return `
    <tr class="hover:bg-gray-50 transition-colors">
      <td class="px-6 py-4">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center text-primary text-sm font-bold">${initials}</div>
          <span class="font-medium">${s.name}</span>
        </div>
      </td>
      <td class="px-6 py-4 text-gray-400 text-xs">${s.phone}</td>
      <td class="px-6 py-4 font-bold text-slate-700">${s.flippedCardsCount || 0}</td>
      <td class="px-6 py-4 text-gray-500">${studyTimeStr}</td>
      <td class="px-6 py-4 font-semibold">${s.testCount}</td>
      <td class="px-6 py-4">${s.lastScore != null ? s.lastScore + '/64' : '—'}</td>
      <td class="px-6 py-4">${passLabel}</td>
      <td class="px-6 py-4">
        <button onclick="viewHistory(${s.id}, '${s.name}')"
          class="text-xs px-3 py-1 rounded border border-gray-200 hover:bg-gray-50 text-gray-600 font-medium">
          History
        </button>
      </td>
    </tr>`;
  }).join('');
}

function filterStudents() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allStudents.filter(s =>
    s.name.toLowerCase().includes(q) || s.phone.toLowerCase().includes(q));
  renderTable(filtered);
}

async function viewHistory(id, name) {
  document.getElementById('drawer-name').textContent = name + ' — History';
  document.getElementById('drawer-content').innerHTML = '<p class="text-gray-400">Loading...</p>';
  document.getElementById('history-drawer').classList.remove('hidden');
  document.getElementById('drawer-overlay').classList.remove('hidden');

  try {
    const results = await apiFetch(`/students/${id}/results`);
    if (results.length === 0) {
      document.getElementById('drawer-content').innerHTML = '<p class="text-gray-400 text-center py-8">No test history yet.</p>';
      return;
    }
    document.getElementById('drawer-content').innerHTML = results.map((r, i) => {
      const date = new Date(r.takenAt).toLocaleString('en-ZA');
      const mins = Math.floor(r.durationSeconds / 60);
      const secs = r.durationSeconds % 60;
      return `
      <div class="p-4 rounded-custom border ${r.overallPass ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-bold text-gray-500">Attempt #${results.length - i}</span>
          <span class="px-2 py-0.5 text-xs font-bold rounded-full ${r.overallPass ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800'}">${r.overallPass ? 'PASS' : 'FAIL'}</span>
        </div>
        <p class="text-xs text-gray-500 mb-3">${date} · ${mins}m ${secs}s</p>
        <div class="grid grid-cols-3 gap-2 text-center">
          <div class="bg-white rounded p-2 border border-gray-100">
            <p class="text-xs text-gray-400">Rules</p>
            <p class="font-bold ${r.rulesScore >= 22 ? 'text-green-600' : 'text-red-500'}">${r.rulesScore}/${r.rulesTotal}</p>
          </div>
          <div class="bg-white rounded p-2 border border-gray-100">
            <p class="text-xs text-gray-400">Signs</p>
            <p class="font-bold ${r.signsScore >= 22 ? 'text-green-600' : 'text-red-500'}">${r.signsScore}/${r.signsTotal}</p>
          </div>
          <div class="bg-white rounded p-2 border border-gray-100">
            <p class="text-xs text-gray-400">Controls</p>
            <p class="font-bold ${r.controlsScore >= 6 ? 'text-green-600' : 'text-red-500'}">${r.controlsScore}/${r.controlsTotal}</p>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('drawer-content').innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`;
  }
}

function closeDrawer() {
  document.getElementById('history-drawer').classList.add('hidden');
  document.getElementById('drawer-overlay').classList.add('hidden');
}

function logout() { sessionStorage.removeItem('adminCode'); window.location.href = 'index.html'; }

init();
</script>
</body>
</html>
